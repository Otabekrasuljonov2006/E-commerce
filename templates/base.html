<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}E-Commerce{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1217;
      --panel: #151a22;
      --card: #1b2330;
      --accent: #e6b450;
      --text: #e6edf3;
      --muted: #9aa7b2;
      --line: #2a3647;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #253041, transparent),
                  radial-gradient(900px 500px at 90% 0%, #2d1f1b, transparent),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(12, 15, 20, 0.8);
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand {
      font-weight: 700;
      letter-spacing: 0.6px;
      color: var(--accent);
    }
    .nav-links {
      display: flex;
      gap: 14px;
      font-size: 14px;
      color: var(--muted);
    }
    .nav-links a:hover { color: var(--text); }
    .container {
      max-width: 1100px;
      margin: 24px auto 60px;
      padding: 0 20px;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--accent);
      color: #111;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn.secondary {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a class="brand" href="{% url 'product_list' %}">E-MARKET</a>
    <div class="nav-links">
      <a href="{% url 'product_list' %}">Mahsulotlar</a>
      <a href="{% url 'cart_detail' %}">Savat</a>
      <a href="{% url 'my_orders' %}">Buyurtmalar</a>
      {% if request.user.is_authenticated %}
        <a href="{% url 'logout' %}">Chiqish</a>
      {% else %}
        <a href="{% url 'login' %}">Kirish</a>
      {% endif %}
    </div>
  </div>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
